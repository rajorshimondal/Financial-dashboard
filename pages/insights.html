<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Insights</title>
    <link rel="stylesheet" href="../css/index.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="min-h-screen bg-gray-50 p-4">
        <header class="bg-emerald-100 shadow rounded-md mb-6">
            <div class="container mx-auto px-4 py-6 flex items-center justify-between rounded-md">
                <h1 class="text-2xl font-bold text-gray-800 ">Financial Insights</h1>
                <nav>
                    <a href="../index.html" class="text-gray-600 hover:text-gray-800 font-lg">Dashboard</a>
                </nav>
            </div>
        </header>

        <main class="container mx-auto px-4 py-8">
            <section class="mb-8">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">Your Financial Overview</h2>
                <p class="text-gray-600">Here are some insights based on your recent financial activity.</p>
            </section>

            <!-- Insights content will go here -->
            <section id="insightsContent" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Dynamic insights will be injected here by JavaScript -->
            </section>
        </main>

    <script src="../javascript/index.js"></script>
</body>
</html>
